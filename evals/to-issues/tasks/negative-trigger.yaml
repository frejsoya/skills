id: to-issues-negative-001
name: to-issues negative trigger (routes elsewhere)
description: A confusable prompt that should route to 'to-prd', not 'to-issues'.
tags: [negative-trigger, routing]
inputs:
  prompt: "Turn this conversation into a PRD."
graders:
